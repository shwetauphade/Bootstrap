<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Movie Ticket Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#111827;
}

.card{
    transition:0.4s;
    border-radius:15px;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    height:450px;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow-lg">

<img src="/cards/image 1.webp" class="card-img-top" alt="Movie">
<div class="text-center my-3">
    <img src="/cards/images (7).jfif"
         class="img-fluid">
        
    <h5 class="mt-2"> Free Popcorn Available</h5>
</div>

<div class="card-body">

<h3 class="card-title text-center"> Interstellar</h3>

<div class="text-center mb-3">
<span class="badge bg-danger">IMDb 8.7 </span>
<span class="badge bg-success">Now Showing</span>
</div>

<p>
 <b>Genre:</b> Sci-Fi, Adventure<br>
 <b>Language:</b> English<br>
 <b>Release:</b> 7 may 2025<br>
 <b>Duration:</b> 2h 49m<br>
 <b>Ticket:</b> ₹299<br>
 <b>Seats Left:</b> 42
</p>

<div class="d-grid gap-2">
<button class="btn btn-danger"> Book Ticket</button>
<button class="btn btn-primary">Watch Trailer</button>
<button class="btn btn-outline-dark"> Add to Wishlist</button>
</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
